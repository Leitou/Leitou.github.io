// ─── Locale Detection ────────────────────────────────────────────────────────
const browserLocale = (navigator.languages && navigator.languages[0]) || navigator.language || 'en-US';
function findMatchingLocale(locale) {
  if (TRANSLATIONS[locale]) return locale;
  const lang = locale.split('-')[0];
  const match = Object.keys(TRANSLATIONS).find(k => k.startsWith(lang + '-'));
  return match || 'en-US';
}
const locale = findMatchingLocale(browserLocale);
function t(key) {
  return (TRANSLATIONS[locale] && TRANSLATIONS[locale][key]) || TRANSLATIONS['en-US'][key] || key;
}

// ─── Code Execution Simulation ────────────────────────────────────────────────
function executeCode(code) {
  try {
    const printRegex = /print\((.*?)\)/g;
    const matches = [];
    let match;
    while ((match = printRegex.exec(code)) !== null) {
      let value = match[1].trim();
      if ((value.startsWith("'") && value.endsWith("'")) || (value.startsWith('"') && value.endsWith('"'))) {
        matches.push(value.slice(1, -1));
      } else if (value.match(/^\d+$/)) {
        matches.push(value);
      } else if (value.includes('f\'') || value.includes('f"')) {
        if (code.includes("name = 'Python'") || code.includes('name = "Python"')) {
          matches.push('Hello, Python!');
        }
        if (code.includes('color = input(')) {
          matches.push('Your favorite color is blue');
        }
        if (code.includes("say_hello('World')") || code.includes('say_hello("World")')) {
          matches.push('Hello, World!');
        }
      } else if (value.includes('+')) {
        try { matches.push(String(eval(value))); } catch { matches.push(value); }
      } else if (code.includes('fruits[1]')) {
        matches.push('banana');
      } else if (code.includes('[1, 2, 3, 4]')) {
        matches.push('[1, 2, 3, 4]');
      } else if (code.includes("person['name']") || code.includes('person["name"]')) {
        matches.push('Alice');
      } else if (code.includes('.upper()')) {
        matches.push('PYTHON PROGRAMMING');
      } else {
        if (code.includes('age = 25')) matches.push('25');
        if (code.includes('Hello!')) matches.push('Hello!');
        if (code.includes('Hello, World!')) matches.push('Hello, World!');
        if (code.includes('Yes, 10 is greater than 5')) matches.push('Yes, 10 is greater than 5');
      }
    }
    if (code.includes('for i in range(1, 4)')) { matches.push('1', '2', '3'); }
    if (code.includes('while count <= 3')) { matches.push('1', '2', '3'); }
    if (code.includes('for num in numbers:') && code.includes('print(num * 2)')) { matches.push('2', '4', '6', '8', '10'); }
    return matches.join('\n');
  } catch (e) {
    return "Error: " + e.message;
  }
}

Please respond in ${locale} language.

{
  "isCorrect": true/false,

  const response = await fetch("https://api.anthropic.com/v1/messages", {

    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      model: "claude-sonnet-4-20250514",
      max_tokens: 1000,
      messages: [{ role: "user", content: prompt }]
    })
  });
  const data = await response.json();
  const text = data.content.map(i => i.text || '').join('');
  const clean = text.replace(/```json|```/g, '').trim();
  return JSON.parse(clean);
}

// ─── Render Helpers ───────────────────────────────────────────────────────────
function icon(id, cls='w-5 h-5') {
  return `<svg class="${cls}" aria-hidden="true"><use href="#icon-${id}"/></svg>`;
}

function renderFeedback() {
  const fb = state.feedback;
  if (!fb) return '';
  const colorMap = { success: 'bg-green-50 border-green-200', loading: 'bg-blue-50 border-blue-200', error: 'bg-red-50 border-red-200' };
  const textMap  = { success: 'text-green-800', loading: 'text-blue-800', error: 'text-red-800' };
  return `
    <div class="p-4 rounded-lg mb-6 border ${colorMap[fb.type]}">
      <p class="font-medium mb-2 ${textMap[fb.type]}">${fb.message}</p>
      ${fb.explanation ? `<p class="text-sm text-gray-700 mb-2">${fb.explanation}</p>` : ''}
      ${fb.output     ? `<p class="text-sm text-gray-600 mb-1">${t('yourOutput')}</p><pre class="bg-gray-100 p-2 rounded text-sm font-mono mb-2">${fb.output}</pre>` : ''}
      ${fb.expected   ? `<p class="text-sm text-gray-600 mb-1">${t('expectedOutput')}</p><pre class="bg-gray-100 p-2 rounded text-sm font-mono mb-2">${fb.expected}</pre>` : ''}
      ${fb.hint && fb.type === 'error' ? `<div class="mt-3 p-3 bg-blue-50 rounded"><p class="text-sm text-blue-800"><strong>${t('tipLabel')}</strong> ${fb.hint}</p></div>` : ''}
    </div>`;
}

function renderLevelModal() {
  if (!state.showLevelSelector) return '';
  const maxUnlocked = Math.max(1, state.completedLevels.size > 0 ? Math.max(...state.completedLevels) + 1 : 1);
  const cards = levels.map(level => {
    const isCompleted = state.completedLevels.has(level.id);
    const isLocked    = level.id > maxUnlocked;
    const isCurrent   = level.id === state.currentLevel;
    const borderCls   = isCurrent   ? 'border-blue-500 bg-blue-50'
                      : isCompleted ? 'border-green-500 bg-green-50 hover:bg-green-100'
                      : isLocked    ? 'border-gray-300 bg-gray-100 opacity-50 cursor-not-allowed'
                      :               'border-gray-300 bg-white hover:border-blue-300 hover:bg-blue-50';
    const badge = isCompleted ? icon('check-circle','w-5 h-5 text-green-600')
                : isLocked    ? icon('lock','w-5 h-5 text-gray-400') : '';
    return `
      <button data-levelid="${level.id}" ${isLocked ? 'disabled' : ''} class="level-card p-4 rounded-lg border-2 text-left transition-all ${borderCls}">
        <div class="flex items-center justify-between mb-2">
          <span class="font-bold text-sm text-gray-600">${t('levelButton')} ${level.id}</span>
          ${badge}
        </div>
        <h3 class="font-semibold text-gray-800 mb-1">${level.title}</h3>
        <p class="text-xs text-gray-600 line-clamp-2">${level.description}</p>
      </button>`;
  }).join('');
  return `
    <div id="level-modal" class="fixed inset-0 bg-black bg-opacity-50 z-50 flex items-center justify-center p-4">
      <div class="bg-white rounded-xl max-w-4xl w-full max-h-[80vh] overflow-y-auto">
        <div class="p-6">
          <div class="flex justify-between items-center mb-6">
            <h2 class="text-2xl font-bold text-gray-800">${t('selectLevel')}</h2>
            <button id="close-modal" class="text-gray-500 hover:text-gray-700 text-2xl leading-none">${t('closeButton')}</button>
          </div>
          <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">${cards}</div>
        </div>
      </div>
    </div>`;
}

function render() {
  const level = levels.find(l => l.id === state.currentLevel);
  const progressPct = (state.completedLevels.size / levels.length) * 100;
  const isCompleted = state.completedLevels.has(state.currentLevel);
  const maxUnlocked = Math.max(1, state.completedLevels.size > 0 ? Math.max(...state.completedLevels) + 1 : 1);
  const canNext = isCompleted && state.currentLevel < levels.length;
  const canPrev = state.currentLevel > 1;

  document.getElementById('app').innerHTML = `
    <!-- Header -->
    <header class="bg-white shadow-lg border-b-2 border-blue-500">
      <div class="max-w-7xl mx-auto px-4 py-4">
        <div class="flex items-center justify-between">
          <div class="flex items-center space-x-4">
            <h1 class="text-3xl font-bold text-blue-600">${t('appTitle')}</h1>
            <div class="hidden md:flex items-center space-x-2 text-gray-600">
              ${icon('trophy','w-5 h-5')}
              <span class="font-medium">${state.completedLevels.size}/${levels.length} ${t('levelsProgress')}</span>
            </div>
          </div>
          <div class="flex items-center space-x-4">
            <div class="flex items-center space-x-2 bg-orange-100 px-3 py-1 rounded-full">
              ${icon('flame','w-4 h-4 text-orange-500')}
              <span class="font-bold text-orange-700">${state.streak}</span>
              <span class="text-orange-600 text-sm">${t('streakLabel')}</span>
            </div>
            <button id="btn-level-selector" class="bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700 transition-colors font-medium">
              ${t('levelButton')} ${state.currentLevel}
            </button>
          </div>
        </div>
        <div class="mt-4">
          <div class="flex justify-between text-sm text-gray-600 mb-1">
            <span>${t('overallProgress')}</span>
            <span>${Math.round(progressPct)}%</span>
          </div>
          <div class="w-full bg-gray-200 rounded-full h-2">
            <div class="bg-blue-600 h-2 rounded-full transition-all duration-500" style="width:${progressPct}%"></div>
          </div>
        </div>
      </div>
    </header>

    ${renderLevelModal()}

    <!-- Main -->
    <main class="max-w-7xl mx-auto px-4 py-8">
      <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">

        <!-- Left: Instructions -->
        <div class="bg-white rounded-xl shadow-lg p-6">
          <div class="mb-6">
            <div class="flex items-center justify-between mb-4">
              <h2 class="text-2xl font-bold text-gray-800">${t('levelButton')} ${state.currentLevel}: ${level.title}</h2>
              ${isCompleted ? icon('check-circle','w-6 h-6 text-green-600') : ''}
            </div>
            <p class="text-gray-600 mb-4">${level.description}</p>
            <div class="bg-blue-50 border-l-4 border-blue-500 p-4 rounded-r-lg">
              <h3 class="font-semibold text-blue-800 mb-2">${t('taskLabel')}</h3>
              <p class="text-blue-700">${level.task}</p>
            </div>
          </div>

          <!-- Hint -->
          <div class="mb-6">
            <button id="btn-hint" class="flex items-center space-x-2 text-yellow-600 hover:text-yellow-700 transition-colors">
              ${icon('lightbulb','w-5 h-5')}
              <span class="font-medium">${state.showHint ? t('hideHint') : t('showHint')}</span>
            </button>
            ${state.showHint ? `<div class="mt-3 bg-yellow-50 border-l-4 border-yellow-400 p-4 rounded-r-lg"><p class="text-yellow-800">${level.hint}</p></div>` : ''}
          </div>

          ${renderFeedback()}
        </div>

        <!-- Right: Code Editor -->
        <div class="bg-white rounded-xl shadow-lg overflow-hidden">
          <div class="bg-gray-800 text-white p-4 flex items-center justify-between">
            <h3 class="font-semibold">${t('pythonCodeEditor')}</h3>
            <div class="flex items-center space-x-2">
              <button id="btn-reset" class="flex items-center space-x-1 bg-gray-700 hover:bg-gray-600 px-3 py-1 rounded transition-colors text-sm">
                ${icon('rotate-ccw','w-4 h-4')} <span>${t('resetButton')}</span>
              </button>
              <button id="btn-run" class="flex items-center space-x-1 bg-green-600 hover:bg-green-500 px-3 py-1 rounded transition-colors text-sm">
                ${icon('play','w-4 h-4')} <span>${t('runCodeButton')}</span>
              </button>
            </div>
          </div>
          <textarea id="code-editor" placeholder="${t('codeEditorPlaceholder')}" spellcheck="false">${escapeHtml(state.userCode)}</textarea>
        </div>
      </div>

      <!-- Navigation -->
      <div class="mt-8 flex justify-between items-center">
        <button id="btn-prev" ${canPrev ? '' : 'disabled'} class="px-6 py-3 bg-gray-600 text-white rounded-lg hover:bg-gray-700 disabled:opacity-50 disabled:cursor-not-allowed transition-colors">
          ${t('previousLevel')}
        </button>
        <p class="text-gray-600">${t('levelOf').replace('{current}', state.currentLevel).replace('{total}', levels.length)}</p>
        <button id="btn-next" ${canNext ? '' : 'disabled'} class="px-6 py-3 bg-blue-600 text-white rounded-lg hover:bg-blue-700 disabled:opacity-50 disabled:cursor-not-allowed transition-colors">
          ${t('nextLevel')}
        </button>
      </div>
    </main>`;

  attachEvents();
}

function escapeHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ─── Event Attachment ─────────────────────────────────────────────────────────
function attachEvents() {
  // Level selector toggle
  document.getElementById('btn-level-selector').addEventListener('click', () => {
    state.showLevelSelector = !state.showLevelSelector;
    render();
  });

  // Close modal
  const closeBtn = document.getElementById('close-modal');
  if (closeBtn) closeBtn.addEventListener('click', () => { state.showLevelSelector = false; render(); });

  // Level cards
  document.querySelectorAll('.level-card').forEach(btn => {
    btn.addEventListener('click', () => {
      const id = parseInt(btn.dataset.levelid);
      const maxUnlocked = Math.max(1, state.completedLevels.size > 0 ? Math.max(...state.completedLevels) + 1 : 1);
      if (id <= maxUnlocked) {
        state.currentLevel = id;
        state.userCode = levels.find(l => l.id === id).starterCode;
        state.showHint = false;
        state.feedback = null;
        state.showLevelSelector = false;
        render();
      }
    });
  });

  // Hint toggle
  document.getElementById('btn-hint').addEventListener('click', () => {
    state.showHint = !state.showHint;
    render();
  });

  // Code editor sync
  document.getElementById('code-editor').addEventListener('input', e => {
    state.userCode = e.target.value;
  });

  // Reset
  document.getElementById('btn-reset').addEventListener('click', () => {
    const level = levels.find(l => l.id === state.currentLevel);
    state.userCode = level.starterCode;
    state.feedback = null;
    state.showHint = false;
    render();
  });

  // Run / Submit
  document.getElementById('btn-run').addEventListener('click', handleSubmit);

  // Prev/Next
  document.getElementById('btn-prev').addEventListener('click', () => {
    if (state.currentLevel > 1) changeLevel(state.currentLevel - 1);
  });
  document.getElementById('btn-next').addEventListener('click', () => {
    if (state.completedLevels.has(state.currentLevel) && state.currentLevel < levels.length) changeLevel(state.currentLevel + 1);
  });

  // Close modal on backdrop click
  const modal = document.getElementById('level-modal');
  if (modal) modal.addEventListener('click', e => { if (e.target === modal) { state.showLevelSelector = false; render(); } });
}

function changeLevel(id) {
  state.currentLevel = id;
  state.userCode = levels.find(l => l.id === id).starterCode;
  state.showHint = false;
  state.feedback = null;
  render();
}

async function handleSubmit() {
  const level = levels.find(l => l.id === state.currentLevel);
  // Read latest code from textarea directly (state may not have synced on fast clicks)
  const codeEl = document.getElementById('code-editor');
  if (codeEl) state.userCode = codeEl.value;

  state.feedback = { type: 'loading', message: t('evaluatingCode') };
  render();

  try {
    const evaluation = await evaluateWithClaude(level, state.userCode);
    if (evaluation.isCorrect) {
      state.completedLevels.add(state.currentLevel);
      state.streak++;
      state.feedback = { type: 'success', message: t('excellentComplete'), explanation: evaluation.feedback };
    } else {
      state.streak = 0;
      state.feedback = { type: 'error', message: t('notQuiteRight'), explanation: evaluation.feedback, hint: evaluation.explanation, expected: level.expectedOutput };
    }
  } catch (err) {
    // Fallback: simple simulation
    const output = executeCode(state.userCode);
    const isCorrect = output.trim() === level.expectedOutput.trim();
    if (isCorrect) {
      state.completedLevels.add(state.currentLevel);
      state.streak++;
      state.feedback = { type: 'success', message: t('excellentComplete'), output };
    } else {
      state.streak = 0;
      state.feedback = { type: 'error', message: t('notQuiteRight'), output, expected: level.expectedOutput, hint: level.hint };
    }
  }
  render();
}

// ─── Boot ─────────────────────────────────────────────────────────────────────
state.userCode = levels[0].starterCode;
render();
</script>

<div id="app"></div>

</body>
</html>
